<div class="bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition-shadow">
  <!-- Header with name and action buttons -->
  <div class="flex justify-between items-start mb-4">
    <div class="flex-1">
      <h3 class="text-xl font-bold text-gray-900">{{ employee().firstName }} {{ employee().lastName }}</h3>
      <p class="text-gray-600">ID: {{ employee().id }}</p>
    </div>
    <div class="flex gap-2">
      <button 
        (click)="toggleEditMode()"
        class="btn-secondary btn-sm"
      >
        <span *ngIf="!isEditMode()">✏️ Edit</span>
        <span *ngIf="isEditMode()">✕ Cancel</span>
      </button>
      <button 
        (click)="onDelete()"
        class="btn-danger btn-sm"
      >
        🗑️ Delete
      </button>
    </div>
  </div>

  <!-- Display Mode -->
  <div *ngIf="!isEditMode()" class="space-y-3">
    <div>
      <span class="text-sm font-medium text-gray-600">Email:</span>
      <p class="text-gray-900">{{ employee().email }}</p>
    </div>
    <div>
      <span class="text-sm font-medium text-gray-600">Age:</span>
      <p class="text-gray-900">{{ employee().age }} years old</p>
    </div>
    <div>
      <span class="text-sm font-medium text-gray-600">Birthdate:</span>
      <p class="text-gray-900">{{ formatDate(employee().birthdate) }}</p>
    </div>
    <div>
      <span class="text-sm font-medium text-gray-600">Salary:</span>
      <p class="text-gray-900 font-semibold">${{ formatSalary(employee().salary) }}</p>
    </div>
  </div>

  <!-- Edit Mode -->
  <div *ngIf="isEditMode()" class="space-y-3">
    <div>
      <label class="text-sm font-medium text-gray-600">Email:</label>
      <input 
        type="email"
        [(ngModel)]="editData.email"
        class="input-field text-sm mt-1"
      />
    </div>
    <div>
      <label class="text-sm font-medium text-gray-600">Salary:</label>
      <input 
        type="number"
        [(ngModel)]="editData.salary"
        class="input-field text-sm mt-1"
      />
    </div>
    <div class="flex gap-2 justify-end pt-2">
      <button 
        (click)="toggleEditMode()"
        class="btn-secondary btn-sm"
      >
        Cancel
      </button>
      <button 
        (click)="saveEdit()"
        class="btn-primary btn-sm"
      >
        Save Changes
      </button>
    </div>
  </div>
</div>
